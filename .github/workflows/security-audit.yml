name: Security Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

jobs:
  prod-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check production dependency advisories against baseline
        run: node scripts/check-prod-audit-baseline.mjs --baseline security/npm-audit-prod-baseline.json --report security/current-prod-audit.json

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-audit-report
          path: security/current-prod-audit.json
