name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Security Regression Tests
        run: npm run test -- src/test/security-regressions.test.ts src/test/match-session.test.ts

      - name: Full Test Suite
        run: npm run test

      - name: Build
        run: npm run build
