name: Deploy Website (Vercel)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate deploy secrets and variables
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          test -n "$VERCEL_TOKEN" || { echo "Missing secret VERCEL_TOKEN"; exit 1; }
          test -n "$VERCEL_ORG_ID" || { echo "Missing secret VERCEL_ORG_ID"; exit 1; }
          test -n "$VERCEL_PROJECT_ID" || { echo "Missing secret VERCEL_PROJECT_ID"; exit 1; }
          test -n "$VITE_SUPABASE_URL" || { echo "Missing variable VITE_SUPABASE_URL"; exit 1; }
          test -n "$VITE_SUPABASE_PUBLISHABLE_KEY" || { echo "Missing variable VITE_SUPABASE_PUBLISHABLE_KEY"; exit 1; }

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project artifacts
        run: npx vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ vars.VITE_SUPABASE_PROJECT_ID }}
          VITE_DISPLAY_CURRENCY: ${{ vars.VITE_DISPLAY_CURRENCY }}
          VITE_STRIPE_PRICE_TOKENS_10: ${{ vars.VITE_STRIPE_PRICE_TOKENS_10 }}
          VITE_STRIPE_PRICE_TOKENS_15: ${{ vars.VITE_STRIPE_PRICE_TOKENS_15 }}
          VITE_STRIPE_PRICE_TOKENS_30: ${{ vars.VITE_STRIPE_PRICE_TOKENS_30 }}
          VITE_STRIPE_PRICE_VERITY_PASS: ${{ vars.VITE_STRIPE_PRICE_VERITY_PASS }}
          VITE_PRICE_PACK_10_AMOUNT: ${{ vars.VITE_PRICE_PACK_10_AMOUNT }}
          VITE_PRICE_PACK_15_AMOUNT: ${{ vars.VITE_PRICE_PACK_15_AMOUNT }}
          VITE_PRICE_PACK_30_AMOUNT: ${{ vars.VITE_PRICE_PACK_30_AMOUNT }}
          VITE_PRICE_VERITY_PASS_AMOUNT: ${{ vars.VITE_PRICE_VERITY_PASS_AMOUNT }}

      - name: Deploy production build to Vercel
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
